          type: string
          enum: [keep, revert, adjust]
        confidenceScore:
          type: number

    # ============================================================
    # Cognitive Layer
    # ============================================================
    CognitiveResponse:
      description: >
        认知层响应。三种结果类型通过 skillType 字段区分（discriminated union）：
        "diagnostic" → DiagnosticResult, "educational" → EducationalResult, "decision-support" → DecisionSupportResult。
      oneOf:
        - $ref: "#/components/schemas/DiagnosticResult"
        - $ref: "#/components/schemas/EducationalResult"
        - $ref: "#/components/schemas/DecisionSupportResult"
      discriminator:
        propertyName: skillType

    CognitiveAutoTrigger:
      description: >
        重复错误模式自动触发信息。当 shouldAutoTrigger 检测到同一规则在短期内重复触发时返回，
        包含建议调用的 cognitive_skill 参数。Skill 层可直接用此信息调用 cognitive_skill。
        此结构可直接作为 cognitive_skill 的输入（skillType=educational, ruleId, topic, experienceLevel 字段对应）。
      type: object
      properties:
        skillType:
          type: string
          enum: [educational]
          description: 固定为 educational（当前仅支持自动触发教育型技能）
        ruleId:
          type: string
          description: 重复触发的规则 ID
        topic:
          type: string
          description: 自动生成的提示语，说明重复模式检测结果
        experienceLevel:
          type: string
          enum: [beginner, intermediate, advanced]
          description: 推荐的学习者经验级别

    DiagnosticResult:
      type: object
      properties:
        skillType:
          type: string
          enum: [diagnostic]
        analysis:
          type: string
        severity:
          type: string
          enum: [low, medium, high]
        rootCause:
          type: string
        fixSuggestion:
          type: string
        relatedRules:
          type: array
          items:
            type: string

    EducationalResult:
      type: object
      properties:
        skillType:
          type: string
          enum: [educational]
        explanation:
          type: string
        bestPractices:
          type: array
          items:
            type: string
        examples:
          type: array
          items:
            type: string
        learningResources:
          type: array
          items:
            type: string

    DecisionSupportResult:
      type: object
      properties:
        skillType:
          type: string
          enum: [decision-support]
        tradeoffs:
          type: array
          items:
            type: object
            properties:
              medium:
                $ref: "#/components/schemas/RuleMedium"
              pros:
                type: array
                items:
                  type: string
              cons:
                type: array
                items:
                  type: string
        recommendation:
          type: object
          properties:
            medium:
              $ref: "#/components/schemas/RuleMedium"
            reason:
              type: string
            confidence:
              type: number
        alternatives:
