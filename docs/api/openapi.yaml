openapi: "3.0.3"
info:
  title: Harness Automation MCP Server
  description: >
    Harness Automation System 的 MCP (Model Context Protocol) 工具接口规范。
    基于 Harness Engineering 方法论，将"建立有效约束体系"的四步流程自动化。

    注意：本规范描述的是通过 MCP stdio 传输调用的工具接口（而非 HTTP REST API）。
    所有工具通过 JSON-RPC 风格的 CallToolRequest 调用，返回结构化 JSON。

    **Skill + MCP 双层架构**: MCP 层纯计算 + 文件操作，不直接与用户交互。
    Skill 层负责用户交互和流程引导。

    设计文档: `docs/harness-automation-design.md` v3.0 (2026-04-22)
    实现差异在 schema 的 description 中标注。
  version: "1.0.0"
  contact:
    name: Harness Automation Team

servers:
  - url: "mcp://localhost"
    description: MCP Server (stdio transport)

x-mcp-note: >
  本规范中所有 responses 描述的是 MCP CallToolResult 中 content[0].text 字段内的 JSON payload。
  实际线缆格式为 MCP JSON-RPC 包装：{"content": [{"type": "text", "text": "<payload>"}], "isError": false}。
  客户端需先解包 MCP 协议层，再按对应 schema 解析 text 内容。

# ============================================================
# Paths (MCP Tools)
# ============================================================
paths:
  /tools/evaluate_rules:
    post:
      summary: 评估项目适用的规则，输出推荐介质
      description: >
        纯计算工具。输入项目参数，输出规则推荐列表。
        按 techStack 过滤规则，应用四问题判定流（形式化→代价→反馈速度→频率），
        运行冲突检测，将结果写入 .harness/state.json（dryRun=false 时）。
      operationId: evaluateRules
      tags: [核心流程]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: evaluate_rules
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRulesInput"
      responses:
        "200":
          description: 规则评估结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineOutput"
        "400":
          description: 输入校验失败
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarnessError"

  /tools/generate_config:
    post:
      summary: 根据规则决策生成配置文件
      description: >
        生成 CLAUDE.md、ESLint 配置、.claude/settings.json、.gitignore、
        package.json、.husky/ hooks、.github/workflows/ci.yml 等核心配置文件。
        ESLint 配置输出为 Flat Config 格式（根据项目 type 字段
        自动选择 CommonJS 或 ESM）。
        文件名 eslint.config.js，兼容 ESLint v9+。
        写文件前自动备份现有文件到 .harness/backups/{timestamp}/。
        dryRun=true 时只计算预览内容，不执行写操作。
        注意：实现中 decisions 字段名与设计的 recommendations 不同。
        Phase 7 更新：.gitignore 支持 true merge（追加方式合并）；
        ESLint 生成完整 flat config（files、languageOptions、plugins）；
        不再映射 no-process-env 规则（标准 ESLint 中不存在）；
        naming-convention 新增 Prisma 聚合字段豁免。
      operationId: generateConfig
      tags: [核心流程]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: generate_config
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GenerateConfigInput"
      responses:
        "200":
          description: 配置生成结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateConfigOutput"
        "400":
          description: 输入校验失败或无决策。可能的错误码：NO_DECISIONS（无可用决策且无状态）、FILE_WRITE_ERROR（文件写入失败）
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarnessError"

  /tools/query_state:
    post:
      summary: 查询当前项目的 Harness 状态
      description: >
        纯读取操作，不修改任何文件。
        检查 .harness/state.json 是否存在，返回当前阶段和项目摘要信息。
        用于断点续做。
        注意：project、lastEvalAt、confirmedAt、validatedAt、validation、sessionId、generationLog
        仅在对应数据存在时返回，不保证始终存在。
      operationId: queryState
      tags: [核心流程]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: query_state
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectDir]
              properties:
                projectDir:
                  type: string
                  description: 项目目录绝对路径
      responses:
        "200":
          description: 状态查询结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryStateOutput"

  /tools/reset_state:
    post:
      summary: 重置 Harness 状态
      description: 将状态机的 phase 重置为 null，用于重新开始流程。
      operationId: resetState
      tags: [核心流程]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: reset_state
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectDir]
              properties:
                projectDir:
                  type: string
                  description: 项目目录绝对路径
      responses:
        "200":
          description: 重置成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: State reset successfully

  /tools/scan_codebase:
    post:
      summary: 扫描代码库，检测违规模式并与现有 CLAUDE.md 规则合并评估
      description: >
        分析项目代码，检测违规模式，提取现有 CLAUDE.md 中的规则，
        与内置规则合并评估，返回扫描发现和建议规则。
        支持增量扫描缓存（useCache=true）。
        实现中可选的 projectPhase/teamSize/techStack 参数用于规则过滤。
      operationId: scanCodebase
      tags: [核心流程]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: scan_codebase
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanCodebaseInput"
      responses:
        "200":
          description: 扫描结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanCodebaseOutput"

  /tools/init_harness:
    post:
      summary: 一键初始化
      description: >
        快捷入口：跳过交互，内部依次调用 evaluate_rules → 自动确认决策 →
        generate_config → validate_setup。支持 preset 嵌套参数简化调用。
        额外生成：.husky/ Git hooks、.github/workflows/ci.yml CI 流水线、commitlint.config.js、package.json 依赖检查与合并。
        package.json 支持智能合并（已存在则合并依赖，不存在则新建）；
        CI 工作流文件已存在时自动跳过（不覆盖）；
        Husky 配置使用 v9+ 纯 shell 脚本格式（不含 _/husky.sh 引用）；
        输出中包含 installNote 字段，记录依赖安装耗时提示。
        适用于二次运行、CI 环境、有经验的用户。
        dryRun=true 时返回空 files 数组和 summary（不含 validation/errors）。
        dryRun 模式下 summary 仅包含 files 和 decisions 字段，不包含 backupDir/recommendedActions/huskySetup。
      operationId: initHarness
      tags: [核心流程]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: init_harness
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InitHarnessInput"
      responses:
        "200":
          description: >
            初始化结果。非 dryRun 模式返回完整的 files / summary / validation / errors；
            dryRun=true 时仅返回 files（空数组）和 summary（仅含 files 和 decisions 字段，
            不含 backupDir / recommendedActions / huskySetup / permissions / installNote），
            且不含 validation 和 errors 字段。
          content:
            application/json:
              schema:
                type: object
                properties:
                  files:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConfigFileResult"
                  summary:
                    $ref: "#/components/schemas/InitHarnessSummary"
                  validation:
                    $ref: "#/components/schemas/ValidateSetupOutput"
                  errors:
                    type: array
                    items:
                      $ref: "#/components/schemas/ConfigError"
                    description: 文件写入操作中发生的错误列表

  /tools/confirm_decisions:
    post:
      summary: 确认规则决策
      description: >
        用户确认/调整推荐后，将最终决策写入 .harness/state.json，
        将 phase 推进到 confirmed。在执行 generate_config 前需要先确认。
        实现中 decisions 数组支持全量 RuleDecision 或精简版（ruleId + medium）。
      operationId: confirmDecisions
      tags: [核心流程]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: confirm_decisions
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmDecisionsInput"
      responses:
        "200":
          description: 确认结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    const: confirmed
                  summary:
                    type: object
                    properties:
                      totalRules:
                        type: integer
                      byMedium:
                        type: object
                        additionalProperties:
                          type: integer
        "400":
          description: 状态不合法。当前 phase 不是 evaluated/confirmed/generated/validated 时返回 STATE_PHASE_MISMATCH。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarnessError"

  /tools/rollback:
    post:
      summary: 回滚到之前的 Harness 配置状态
      description: >
        从 .harness/backups/ 恢复原始文件，清理 generate_config 生成的新文件。
        支持指定 backupId 或回滚最新备份。
        list=true 时列出可用备份而不执行恢复。
        list=true 时如果没有备份目录，返回 ROLLBACK_FAILED 错误。
        设计中的 target 参数在实现中被替换为 backupId + list 参数。
      operationId: rollback
      tags: [核心流程]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: rollback
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RollbackInput"
      responses:
        "200":
          description: >
            回滚结果。当 list=true 时返回 RollbackListOutput（备份列表），
            否则返回 RollbackOutput（恢复结果）。
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: "#/components/schemas/RollbackOutput"
                  - $ref: "#/components/schemas/RollbackListOutput"
        "400":
          description: 回滚失败。可能的错误码：ROLLBACK_FAILED（备份目录不存在 / 无可用备份 / 指定备份不存在）。
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarnessError"

  /tools/validate_setup:
    post:
      summary: 验证已生成的 Harness 配置
      description: >
        检查文件完整性、ESLint 配置语法、JSON 语法、Husky hooks 可执行权限、
        依赖完整性。默认检查 9 个关键文件（CLAUDE.md、eslint.config.js、
        .claude/settings.json、.gitignore、.husky/pre-commit、.husky/commit-msg、
        .github/workflows/ci.yml、package.json、.harness/state.json），
        并自动检查 package.json 中的 devDependencies 完整性。
        支持选择性跳过语法检查或权限检查。
        Phase 7 新增：ESLint 规则名有效性检查（检测 eslint.config.js 中是否存在未知规则名）；
        lint-staged 重复配置检测（同时检查 package.json 和 .lintstagedrc.json，提示冗余）。
      operationId: validateSetup
      tags: [核心流程]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: validate_setup
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ValidateSetupInput"
      responses:
        "200":
          description: 验证结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidateSetupOutput"

  /tools/get_rule_stats:
    post:
      summary: 收集并返回规则效果统计数据
      description: >
        实现新增工具（设计 §3.1.13 原 recommend_rule_adjustment 的简化替代）。
        返回触发率、修复率、绕过率、按介质分布等统计数据。
        collect=true 时从当前状态采集新鲜数据。
      operationId: getRuleStats
      tags: [分析优化]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: get_rule_stats
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RuleStatsInput"
      responses:
        "200":
          description: 统计数据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AnalyticsData"
        "400":
          description: 未找到引擎输出或分析数据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarnessError"

  /tools/analyze_rule_adjustments:
    post:
      summary: 推荐规则介质升级/降级调整
      description: >
        实现新增工具。基于使用数据和分析统计，
        通过 RuleAdapter.analyze() 推荐哪些规则应该升级或降级介质。
        与设计的 recommend_rule_adjustment 功能相似但接口简化。
      operationId: analyzeRuleAdjustments
      tags: [分析优化]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: analyze_rule_adjustments
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnalyzeAdjustmentsInput"
      responses:
        "200":
          description: 调整推荐
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdapterResult"
        "400":
          description: 缺少分析前置数据
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarnessError"

  /tools/export_rules:
    post:
      summary: 导出规则配置为可移植 JSON
      description: 实现新增工具。导出当前规则决策为 JSON 格式，
        支持保存到 .harness/exports/ 文件或直接返回。
      operationId: exportRules
      tags: [规则管理]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: export_rules
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportRulesInput"
      responses:
        "200":
          description: 导出数据
          content:
            application/json:
              schema:
                type: object
                properties:
                  export:
                    $ref: "#/components/schemas/RuleExportData"
                  savedPath:
                    type: string
                    nullable: true
        "400":
          description: 未找到引擎输出
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarnessError"

  /tools/import_rules:
    post:
      summary: 从 JSON / 预设 / 文件导入规则配置
      description: >
        实现新增工具。支持三种导入方式：
        presetId（加载内置预设）、exportJson（JSON 字符串）、filePath（导出文件路径）。
        三者至少提供一个。当提供多个来源时，优先级：presetId > exportJson > filePath。
        注意：导入时重建的 RuleDecision 会丢失 adjustedCost、adjustedCostLabel、
        feedbackSpeed、errorMessage 等可选字段（导出/导入 round-trip 数据截断）。
      operationId: importRules
      tags: [规则管理]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: import_rules
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportRulesInput"
      responses:
        "200":
          description: 导入结果
          content:
            application/json:
              schema:
                oneOf:
                  - title: PresetImportResult
                    type: object
                    properties:
                      preset:
                        type: string
                      presetName:
                        type: string
                      decisions:
                        type: array
                        items:
                          $ref: "#/components/schemas/RuleDecision"
                      total:
                        type: integer
                  - title: RawImportResult
                    type: object
                    properties:
                      decisions:
                        type: array
                        items:
                          $ref: "#/components/schemas/RuleDecision"
                      total:
                        type: integer
                      warnings:
                        type: array
                        items:
                          type: string
        "400":
          description: 未找到预设或无效配置
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarnessError"

  /tools/list_rule_presets:
    post:
      summary: 列出可用规则预设模板
      description: 实现新增工具。支持按技术栈过滤预设列表。
      operationId: listRulePresets
      tags: [规则管理]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: list_rule_presets
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListRulePresetsInput"
      responses:
        "200":
          description: 预设列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  presets:
                    type: array
                    items:
                      $ref: "#/components/schemas/RulePreset"

  /tools/list_rule_exports:
    post:
      summary: 列出已保存的导出文件
      description: 实现新增工具。列出 .harness/exports/ 中的导出文件。
      operationId: listRuleExports
      tags: [规则管理]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: list_rule_exports
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ListRuleExportsInput"
      responses:
        "200":
          description: 导出文件列表
          content:
            application/json:
              schema:
                type: object
                properties:
                  exports:
                    type: array
                    items:
                      type: string
                    description: 导出文件名列表（按时间倒序排列）

  /tools/assess_suitability:
    post:
      summary: 评估项目是否适合应用 Harness 约束体系
      description: >
        在流程开始时调用，评估项目适合度。
        检查 Git 历史、文件结构、依赖管理和测试覆盖。
        设计中的 analysisDepth（quick/full）决定分析深度；
        实现额外接受 techStack 数组参数。
      operationId: assessSuitability
      tags: [核心流程]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: assess_suitability
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectDir]
              properties:
                projectDir:
                  type: string
                  description: 项目目录绝对路径
                techStack:
                  type: array
                  items:
                    type: string
                  description: 技术栈（可选，实现新增）
                analysisDepth:
                  type: string
                  enum: [quick, full]
                  default: full
                  description: 分析深度
      responses:
        "200":
          description: 评估结果
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuitabilityAssessment"

  /tools/start_ab_test:
    post:
      summary: 启动 A/B 测试
      description: >
        为特定规则启动 A/B 测试，对比两种介质配置的效果。
        创建测试记录到 .harness/ab_tests.json。
        实现中接受扁平参数而非设计中的嵌套 testConfig 对象。
      operationId: startABTest
      tags: [A/B 测试]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: start_ab_test
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectDir, ruleId, baselineMedium, testMedium]
              properties:
                projectDir:
                  type: string
                ruleId:
                  type: string
                baselineMedium:
                  $ref: "#/components/schemas/RuleMedium"
                testMedium:
                  $ref: "#/components/schemas/RuleMedium"
                durationDays:
                  type: number
                  default: 14
                metrics:
                  type: array
                  items:
                    oneOf:
                      - type: string
                      - $ref: "#/components/schemas/ABTestMetric"
                  default: [triggerCount, fixRate, bypassCount]
      responses:
        "200":
          description: 测试启动结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  testId:
                    type: string
                  status:
                    type: string
                    enum: [started, already_running, invalid_config]
                  startTime:
                    type: string
                    format: date-time
                  endTime:
                    type: string
                    format: date-time
                    description: 测试结束时间（仅 status=started 时存在）
                  message:
                    type: string
                    description: 人类可读的状态说明

  /tools/collect_ab_metrics:
    post:
      summary: 收集 A/B 测试数据点
      description: >
        为一个活跃的 A/B 测试收集一条数据点。
        与设计不同：实现采用扁平参数（非嵌套 timeRange），
        且每次调用只传入单条数据点而非批量收集。
      operationId: collectABMetrics
      tags: [A/B 测试]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: collect_ab_metrics
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectDir, testId, triggerCount, fixRate, bypassCount]
              properties:
                projectDir:
                  type: string
                testId:
                  type: string
                triggerCount:
                  type: number
                fixRate:
                  type: number
                  description: 修复率（0-1）
                bypassCount:
                  type: number
                userFeedback:
                  type: string
      responses:
        "200":
          description: 数据点收集结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  collected:
                    type: boolean
                  message:
                    type: string

  /tools/analyze_ab_results:
    post:
      summary: 分析 A/B 测试结果
      description: >
        分析收集到的 A/B 测试数据，返回统计显著性和推荐操作。
        与设计不同：实现中 testId 可选（不指定则分析所有活跃测试），
        且不要求 significanceLevel 参数。
      operationId: analyzeABResults
      tags: [A/B 测试]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: analyze_ab_results
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectDir]
              properties:
                projectDir:
                  type: string
                testId:
                  type: string
                  description: 可选，不指定则分析所有活跃测试
      responses:
        "200":
          description: 分析结果
          content:
            application/json:
              schema:
                type: object
                properties:
                  results:
                    type: array
                    items:
                      $ref: "#/components/schemas/ABTestResult"
                  summary:
                    type: object
                    properties:
                      total:
                        type: integer
                      significant:
                        type: integer
                      keep:
                        type: integer
                      revert:
                        type: integer
                      adjust:
                        type: integer

  /tools/cognitive_skill:
    post:
      summary: 认知层技能调用
      description: >
        实现新增工具。调用认知层的三大技能：
        diagnostic（诊断代码模式）、educational（教育解释）、
        decision-support（决策支持）。根据 skillType 启用不同参数。
      operationId: cognitiveSkill
      tags: [认知层]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: cognitive_skill
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CognitiveSkillInput"
      responses:
        "200":
          description: 认知层响应
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CognitiveResponse"
        "400":
          description: 规则未找到或输入无效
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HarnessError"

  /tools/suggest_error_improvement:
    post:
      summary: 分析错误信息模板使用效果并建议优化方向
      description: >
        实现新增工具。基于模板使用频率、用户评分和修复率，
        通过 ErrorMessageEvaluator 生成改进建议。
      operationId: suggestErrorImprovement
      tags: [错误优化]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: suggest_error_improvement
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [projectDir]
              properties:
                projectDir:
                  type: string
      responses:
        "200":
          description: 改进建议
          content:
            application/json:
              schema:
                type: object
                properties:
                  stats:
                    $ref: "#/components/schemas/EvaluationStats"
                  suggestions:
                    type: array
                    items:
                      type: string

  /tools/optimize_error_message:
    post:
      summary: 生成优化后的错误信息
      description: >
        实现新增工具。根据规则 ID、场景或代码上下文
        返回包含 why/whatInstead/reference 三要素的结构化错误信息。
        支持记录评价（rateAfter）。所有参数可选。
        不提供 ruleId、scenario 和 ruleName 时 suggestions 为空数组。
        提供的参数越多（ruleId > scenario > ruleName），匹配准确度越高。
      operationId: optimizeErrorMessage
      tags: [错误优化]
      parameters:
        - name: toolName
          in: query
          required: true
          schema:
            type: string
            const: optimize_error_message
          description: MCP 工具名称（固定值）
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: []
              properties:
                projectDir:
                  type: string
                  description: 项目目录路径。不传时不记录评价数据。另用于记录触发历史以检测重复错误模式（需同时提供 ruleId）。
                ruleId:
                  type: string
                ruleName:
                  type: string
                scenario:
                  type: string
                actualCode:
                  type: string
                fileName:
                  type: string
                lineNumber:
                  type: number
                rateAfter:
                  type: boolean
      responses:
        "200":
          description: 优化后的错误信息
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items:
                      $ref: "#/components/schemas/ErrorSuggestion"
                  stats:
                    $ref: "#/components/schemas/EvaluationStats"
                    description: 评价统计数据。仅当 projectDir 已设置且 rateAfter !== false 时返回。未记录评价时此字段不出现。
                  repeatedPattern:
                    $ref: "#/components/schemas/CognitiveAutoTrigger"
                    description: 重复错误模式检测结果。当同一规则在最近 3 次触发中出现 ≥2 次时返回，供 Skill 层决定是否自动触发 cognitive_skill educational。

# ============================================================
# Components
# ============================================================
components:
  schemas:
    # ============================================================
    # Enums
    # ============================================================
    RuleMedium:
      type: string
      enum:
        - linter_error
        - linter_warn
        - linter+hook
        - claude_md
        - ci
        - hook
        - settings
        - none
        # 向后兼容别名（已废弃）:
        - claude.md
        - linter
        - settings.json
      description: >
        规则介质类型（约束强度递减）。
        前 8 个为推荐值；后 3 个为向后兼容别名。
        注意：`linter` 和 `settings.json` 为历史别名，
        当前 generate_config 仅生成 `linter_warn`/`linter_error` 和 `settings`。
        新代码和新规则应避免使用废弃别名。

    TechStack:
      type: string
      enum: [typescript, javascript, python, go, java, generic]
      description: >
        技术栈分类。设计 v3.0 使用 nextjs-ts / react-vite / node-ts / other，
        实现采用更细粒度的 6 值枚举，更适合规则过滤。

    ProjectPhase:
      type: string
      enum: [prototype, early, growth, mature]
      description: >
        项目阶段。设计 v3.0 使用 prototype / development / maintenance，
        实现采用 4 阶段模型以更精确地适配频率评估。

    TeamSize:
      type: string
      enum: [solo, small, medium, large]
      description: >
        团队规模。设计 v3.0 使用 1-2 / 3-5 / 5+，
        实现采用 4 级模型以适配频率乘数。

    HarnessStatus:
      type: string
      nullable: true
      enum: [evaluated, confirmed, generated, validated]
      description: 状态机阶段

    ErrorCode:
      type: string
      enum:
        - STATE_NOT_FOUND
        - STATE_PHASE_MISMATCH
        - FILE_READ_ERROR
        - FILE_WRITE_ERROR
        - FILE_BACKUP_ERROR
        - CONFIRM_REQUIRED
        - NO_DECISIONS
        - INVALID_CONFIG
        - DEPENDENCY_MISSING
        - SCAN_FAILED
        - ROLLBACK_FAILED
        - UNKNOWN_ERROR
        - UNKNOWN_TOOL
      description: >
        错误码。设计 v3.0 定义 10 个错误码（不含 NO_DECISIONS / UNKNOWN_TOOL），
        实现扩展为 13 个，新增 CONFIRM_REQUIRED、NO_DECISIONS、UNKNOWN_TOOL。

    # ============================================================
    # Error
    # ============================================================
    HarnessError:
      type: object
      required: [code, message, recoverable]
      properties:
        code:
          $ref: "#/components/schemas/ErrorCode"
        message:
          type: string
          description: 人类可读的错误描述
        detail:
          type: string
          description: 详细的技术信息（可选）
        recoverable:
          type: boolean
          description: 用户能否自行恢复

    # ============================================================
    # Rule Definition
    # ============================================================
    RuleDefinition:
      type: object
      required: [id, name, description, category, formalizable, cost, feedbackSpeed, frequency, recommendedMedium, alternativeMedium, techStack]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        category:
          type: string
        formalizable:
          type: boolean
        cost:
          type: integer
          minimum: 1
          maximum: 5
          description: 执行代价（1-5）
        feedbackSpeed:
          type: integer
          minimum: 1
          maximum: 5
          description: 反馈速度（1-5，1=最快）
        frequency:
          type: integer
          minimum: 1
          maximum: 5
          description: 发生频率（1-5）
        recommendedMedium:
          $ref: "#/components/schemas/RuleMedium"
        alternativeMedium:
          type: array
          items:
            $ref: "#/components/schemas/RuleMedium"
        techStack:
          type: array
          items:
            $ref: "#/components/schemas/TechStack"
        cognitiveLayerSupport:
          $ref: "#/components/schemas/RuleCognitiveSupport"
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"

    RuleCognitiveSupport:
      type: object
      properties:
        required:
          type: boolean
        skillTriggers:
          type: array
          items:
            type: string
        contextRequirements:
          type: array
          items:
            type: string

    ErrorMessage:
      type: object
      properties:
        why:
          type: string
        whatInstead:
          type: string
        reference:
          type: string

    # ============================================================
    # Input Schemas
    # ============================================================
    EvaluateRulesInput:
      type: object
      required: [projectDir, projectPhase, teamSize, techStack]
      properties:
        projectDir:
          type: string
          description: 项目目录绝对路径
        projectPhase:
          $ref: "#/components/schemas/ProjectPhase"
        teamSize:
          $ref: "#/components/schemas/TeamSize"
        techStack:
          type: array
          items:
            $ref: "#/components/schemas/TechStack"
          description: 技术栈数组（设计为单个 string，实现为数组）
        dryRun:
          type: boolean
          default: false
          description: 预览模式

    GenerateConfigInput:
      type: object
      required: [projectDir, decisions]
      properties:
        projectDir:
          type: string
        decisions:
          type: array
          description: >
            确认后的规则决策。设计字段名为 recommendations，实现使用 decisions。
            传空数组时将回退到 state.json 中的已存决策（evaluate_rules 的结果）。
            两者均为空时返回 NO_DECISIONS 错误。
          items:
            type: object
            required: [ruleId, recommendedMedium]
            properties:
              ruleId:
                type: string
              recommendedMedium:
                $ref: "#/components/schemas/RuleMedium"
        dryRun:
          type: boolean
          default: false

    ScanCodebaseInput:
      type: object
      required: [projectDir]
      properties:
        projectDir:
          type: string
        techStack:
          type: array
          items:
            $ref: "#/components/schemas/TechStack"
          description: 实现新增，设计无此字段。不传时默认 ["generic"]
        projectPhase:
          $ref: "#/components/schemas/ProjectPhase"
          description: 实现新增。不传时默认 "early"
        teamSize:
          $ref: "#/components/schemas/TeamSize"
          description: 实现新增。不传时默认 "small"
        scanDepth:
          type: string
          enum: [quick, full]
          default: full
          description: 扫描深度：quick（配置文件+近期修改源文件），full（全部文件）
        useCache:
          type: boolean
          default: false
          description: 增量扫描缓存（实现新增，设计无此字段）

    InitHarnessInput:
      type: object
      required: [projectDir, projectPhase, teamSize, techStack]
      properties:
        projectDir:
          type: string
        projectPhase:
          $ref: "#/components/schemas/ProjectPhase"
          description: 项目当前阶段
        teamSize:
          $ref: "#/components/schemas/TeamSize"
          description: 开发团队规模
        techStack:
          type: array
          description: 使用的技术栈
          items:
            $ref: "#/components/schemas/TechStack"
        dryRun:
          type: boolean
          default: false
        preset:
          type: object
          description: 嵌套 preset 对象，作为扁平参数的替代嵌套写法。扁平参数优先级高于 preset。使用 preset 时仍需提供 projectPhase、teamSize、techStack（或通过 preset 填充）。
          properties:
            techStack:
              type: array
              items:
                $ref: "#/components/schemas/TechStack"
            projectPhase:
              $ref: "#/components/schemas/ProjectPhase"
            teamSize:
              $ref: "#/components/schemas/TeamSize"

    ConfirmDecisionsInput:
      type: object
      required: [projectDir, decisions]
      properties:
        projectDir:
          type: string
        decisions:
          type: array
          items:
            type: object
            required: [ruleId, recommendedMedium]
            properties:
              ruleId:
                type: string
              ruleName:
                type: string
              recommendedMedium:
                $ref: "#/components/schemas/RuleMedium"
              alternativeMedia:
                type: array
                items:
                  $ref: "#/components/schemas/RuleMedium"
              confidence:
                type: number
                minimum: 0
                maximum: 1
              reasons:
                type: array
                items:
                  type: string
              cognitiveLayerRequired:
                type: boolean
              cognitiveSkillTriggers:
                type: array
                items:
                  type: string

    RollbackInput:
      type: object
      required: [projectDir]
      properties:
        projectDir:
          type: string
        backupId:
          type: string
          description: 指定 backup（默认回滚最新）。设计使用 target（last/all），实现使用 backupId。
        list:
          type: boolean
          default: false
          description: 仅列出备份，不执行回滚（实现新增）

    ValidateSetupInput:
      type: object
      required: [projectDir]
      properties:
        projectDir:
          type: string
        checkFiles:
          type: array
          items:
            type: string
          default:
            - CLAUDE.md
            - eslint.config.js
            - .claude/settings.json
            - .gitignore
            - .husky/pre-commit
            - .husky/commit-msg
            - .github/workflows/ci.yml
            - package.json
            - .harness/state.json
          description: >
            可选，指定要检查的文件列表。
            不传时使用默认 9 个关键文件：
            CLAUDE.md/eslint.config.js/.claude/settings.json/
            .gitignore/.husky/pre-commit/.husky/commit-msg/
            .github/workflows/ci.yml/package.json/.harness/state.json
        skipSyntaxCheck:
          type: boolean
          default: false
          description: 实现新增
        skipPermissionCheck:
          type: boolean
          default: false
          description: 实现新增

    RuleStatsInput:
      type: object
      required: [projectDir]
      properties:
        projectDir:
          type: string
        collect:
          type: boolean
          default: true
          description: 是否从当前状态采集新鲜数据

    AnalyzeAdjustmentsInput:
      type: object
      required: [projectDir]
      properties:
        projectDir:
          type: string

    ExportRulesInput:
      type: object
      required: [projectDir]
      properties:
        projectDir:
          type: string
        saveToFile:
          type: boolean
          default: false
        filename:
          type: string
          description: 自定义导出文件名

    ImportRulesInput:
      type: object
      required: [projectDir]
      properties:
        projectDir:
          type: string
        exportJson:
          type: string
          description: JSON 字符串
        presetId:
          type: string
          description: 预设 ID
        filePath:
          type: string
          description: 导出文件路径

    ListRulePresetsInput:
      type: object
      properties:
        techStack:
          type: array
          items:
            type: string
          description: 按技术栈过滤

    ListRuleExportsInput:
      type: object
      required: [projectDir]
      properties:
        projectDir:
          type: string

    CognitiveSkillInput:
      type: object
      required: [skillType, ruleId]
      properties:
        skillType:
          type: string
          enum: [diagnostic, educational, decision-support]
        ruleId:
          type: string
        projectDir:
          type: string
        codePattern:
          type: string
          description: diagnostic 使用
        contextDescription:
          type: string
          description: diagnostic 使用
        topic:
          type: string
          description: educational 使用
        experienceLevel:
          type: string
          enum: [beginner, intermediate, advanced]
          description: educational 使用
        currentMedium:
          type: string
          description: decision-support 使用
        candidateMedia:
          type: array
          items:
            type: string
          description: decision-support 使用
        projectPhase:
          type: string
          description: decision-support 使用
        teamSize:
          type: string
          description: decision-support 使用
        techStack:
          type: array
          items:
            type: string
          description: decision-support 使用

    # ============================================================
    # Output Schemas
    # ============================================================
    EngineInput:
      type: object
      properties:
        projectDir:
          type: string
        projectPhase:
          $ref: "#/components/schemas/ProjectPhase"
        teamSize:
          $ref: "#/components/schemas/TeamSize"
        techStack:
          type: array
          items:
            $ref: "#/components/schemas/TechStack"
        dryRun:
          type: boolean

    EngineOutput:
      type: object
      properties:
        decisions:
          type: array
          items:
            $ref: "#/components/schemas/RuleDecision"
        conflicts:
          type: array
          items:
            $ref: "#/components/schemas/RuleConflict"
        summary:
          type: object
          properties:
            total:
              type: integer
            byMedium:
              type: object
              additionalProperties:
                type: integer
            highConfidence:
              type: integer
            cognitiveRequired:
              type: integer

    RuleDecision:
      type: object
      required: [ruleId, ruleName, recommendedMedium, alternativeMedia, confidence, reasons, cognitiveLayerRequired, cognitiveSkillTriggers]
      properties:
        ruleId:
          type: string
        ruleName:
          type: string
        recommendedMedium:
          $ref: "#/components/schemas/RuleMedium"
        alternativeMedia:
          type: array
          items:
            $ref: "#/components/schemas/RuleMedium"
        confidence:
          type: number
          format: float
          description: 置信度（0-1）
        reasons:
          type: array
          items:
            type: string
        cognitiveLayerRequired:
          type: boolean
        cognitiveSkillTriggers:
          type: array
          items:
            type: string
        adjustedCost:
          type: number
          description: 设计 §3.1.1：阶段乘数调整后的代价（1-5）
        adjustedCostLabel:
          type: string
          enum: [critical, high, medium, low]
          description: 设计 §3.1.1：代价分类标签
        feedbackSpeed:
          type: number
          description: 设计 §3.1.1：规则定义中的反馈速度（1-5）
        errorMessage:
          $ref: "#/components/schemas/ErrorMessage"

    RuleConflict:
      type: object
      required: [ruleA, ruleB, type, description, resolution]
      properties:
        ruleA:
          type: string
        ruleB:
          type: string
        type:
          type: string
          enum: [direct_conflict, redundant, needs_refinement]
          description: direct_conflict=规则行为直接冲突, redundant=规则覆盖范围重叠, needs_refinement=需要细化调整
        description:
          type: string
        resolution:
          type: string

    GenerateConfigOutput:
      type: object
      properties:
        files:
          type: array
          items:
            $ref: "#/components/schemas/ConfigFileResult"
        summary:
          type: object
          properties:
            total:
              type: integer
            created:
              type: integer
            updated:
              type: integer
            skipped:
              type: integer
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ConfigError"
        warnings:
          type: array
          items:
            type: string

    ConfigFileResult:
      type: object
      properties:
        path:
          type: string
          description: >
            配置文件的相对路径。常见值：CLAUDE.md、eslint.config.js、
            .claude/settings.json、.gitignore、.husky/pre-commit、
            .husky/commit-msg、.github/workflows/ci.yml、package.json、
            commitlint.config.js。lint-staged 配置现已合并到 package.json 的 lint-staged 字段中。
        content:
          type: string
          description: dry_run 模式时返回内容预览
        action:
          type: string
          enum: [created, overwritten, skipped, merged, dry_run]
          description: >
            文件操作类型。枚举值：created（新建）、overwritten（覆盖）、skipped（跳过）、merged（合并追加）、dry_run（预览）。
        backupPath:
          type: string
          description: 备份路径（如果覆盖了已有文件）

    ConfigError:
      type: object
      properties:
